apiVersion: v1
kind: Service
metadata:
  name: brain-tasks-app-svc
  namespace: production
  labels:
    app: brain-tasks-app
  annotations:
    # AWS Load Balancer Controller annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # CloudWatch access logs
    service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-access-log-s3-bucket-name: "brain-tasks-elb-logs"
    service.beta.kubernetes.io/aws-load-balancer-access-log-s3-bucket-prefix: "brain-tasks-app"
spec:
  type: LoadBalancer
  selector:
    app: brain-tasks-app
  ports:
    - name: http
      protocol: TCP
      port: 80            # External port (LoadBalancer listens on 80)
      targetPort: 3000    # Container port
  sessionAffinity: None

---
# Namespace for production workloads
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production
    app.kubernetes.io/managed-by: kubectl

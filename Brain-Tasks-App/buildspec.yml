version: 0.2

env:
  variables:
    AWS_REGION: "ap-south-1"
    ACCOUNT_ID: "941178225946"
    IMAGE_REPO_NAME: "brain-tasks-app"
    IMAGE_TAG: "latest"
    CLUSTER_NAME: "brain-tasks-eks"

phases:
  pre_build:
    commands:
      - echo AWS_REGION=
      - echo ACCOUNT_ID=
      - aws ecr get-login-password --region  | docker login --username AWS --password-stdin .dkr.ecr..amazonaws.com
